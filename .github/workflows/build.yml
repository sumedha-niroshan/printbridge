name: Build PrintBridge

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Lint and Test ──────────────────────────────────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Run rustfmt check
        run: cargo fmt -- --check

      - name: Run clippy linting
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ── Build TypeScript SDK ───────────────────────────────────────────────────
  build-sdk:
    name: Build TypeScript SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: sdk
        run: npm install

      - name: Build SDK
        working-directory: sdk
        run: npm run build

      - name: Upload SDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdk-dist
          path: sdk/dist/
          retention-days: 7

  # ── Cross-compile Rust → Windows x64 ──────────────────────────────────────
  build-windows:
    name: Build Windows EXE (x86_64)
    runs-on: ubuntu-latest
    needs: [lint, build-sdk]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-win-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-win-

      - name: Install MinGW cross-compiler
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64

      - name: Configure Cargo for MinGW
        run: |
          cat > .cargo/config.toml << 'EOF'
          [target.x86_64-pc-windows-gnu]
          linker = "x86_64-w64-mingw32-gcc"
          ar = "x86_64-w64-mingw32-ar"
          EOF

      - name: Build release binaries
        run: |
          echo "Building PrintBridge service..."
          cargo build --release --target x86_64-pc-windows-gnu --bin pxl
          echo "Building installer..."
          cargo build --release --target x86_64-pc-windows-gnu --bin installer

      - name: Download SDK dist
        uses: actions/download-artifact@v4
        with:
          name: sdk-dist
          path: sdk/dist/

      - name: Package release bundle
        run: |
          mkdir -p release/PrintBridge-windows-x64

          echo "Copying binaries..."
          cp target/x86_64-pc-windows-gnu/release/pxl.exe \
             release/PrintBridge-windows-x64/PrintBridge.exe
          cp target/x86_64-pc-windows-gnu/release/installer.exe \
             release/PrintBridge-windows-x64/PrintBridge-installer.exe

          echo "Copying SDK files..."
          cp sdk/dist/printbridge.min.js \
             release/PrintBridge-windows-x64/
          cp sdk/dist/printbridge.esm.js \
             release/PrintBridge-windows-x64/
          cp sdk/dist/printbridge.cjs.js \
             release/PrintBridge-windows-x64/
          cp sdk/dist/index.d.ts \
             release/PrintBridge-windows-x64/

          echo "Copying installation scripts..."
          cp scripts/install-cert.ps1 \
             release/PrintBridge-windows-x64/
          cp scripts/install-service.ps1 \
             release/PrintBridge-windows-x64/
          cp scripts/uninstall-service.ps1 \
             release/PrintBridge-windows-x64/

          echo "Copying configuration..."
          cp config.toml \
             release/PrintBridge-windows-x64/README-CONFIG.toml

          # Write installation guide
          cat > release/PrintBridge-windows-x64/INSTALLATION.md << 'EOF'
          # PrintBridge — Installation Guide

          ## Quick Start

          ### Option 1: Automatic Installer (Recommended)
          1. Run `PrintBridge-installer.exe`
          2. Follow the installation wizard
          3. Service will automatically start

          ### Option 2: Manual Installation
          1. Copy `PrintBridge.exe` to `C:\Program Files\PrintBridge\`
          2. Run `PrintBridge.exe` once (generates TLS certificate in AppData)
          3. Right-click `install-cert.ps1` → Run with PowerShell (as Administrator)
          4. Right-click `install-service.ps1` → Run with PowerShell (as Administrator)

          ## Verification

          - Check Services (services.msc) for "PrintBridge Print Client"
          - Access WebSocket at: `wss://127.0.0.1:8282`

          ## Browser Integration

          Use the included SDK files:
          - `printbridge.min.js` - Minified IIFE for `<script>` tags
          - `printbridge.esm.js` - ES Module format
          - `printbridge.cjs.js` - CommonJS format
          - `index.d.ts` - TypeScript type definitions

          ## Configuration

          Edit `%APPDATA%\PXL\config.toml` to customize:
          - WebSocket host/port
          - TLS settings
          - Default printer
          - Service behavior

          ## Uninstall

          Run `uninstall-service.ps1` as Administrator, then delete the installation folder.
          EOF

          cd release
          zip -r ../PrintBridge-windows-x64.zip PrintBridge-windows-x64/

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: PrintBridge-windows-x64
          path: PrintBridge-windows-x64.zip
          retention-days: 30

      - name: Show binary information
        run: |
          echo "=== Binary Sizes ==="
          echo "PrintBridge Service:"
          ls -lh target/x86_64-pc-windows-gnu/release/pxl.exe
          echo ""
          echo "Installer:"
          ls -lh target/x86_64-pc-windows-gnu/release/installer.exe
          echo ""
          echo "Release Package:"
          ls -lh PrintBridge-windows-x64.zip
          echo ""
          echo "=== Package Contents ==="
          unzip -l PrintBridge-windows-x64.zip | tail -20

  # ── GitHub Release (on tag push only) ────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-windows
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: PrintBridge-windows-x64

      - name: Generate checksums
        run: |
          sha256sum PrintBridge-windows-x64.zip > PrintBridge-windows-x64.zip.sha256
          cat PrintBridge-windows-x64.zip.sha256

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: PrintBridge ${{ steps.version.outputs.version }}
          files: |
            PrintBridge-windows-x64.zip
            PrintBridge-windows-x64.zip.sha256
          generate_release_notes: true
          body: |
            ## PrintBridge ${{ steps.version.outputs.version }}

            🖨️ Silent browser-based print client for Windows — ESC/POS thermal printer support via WebSocket.

            ## ✨ Features
            - Silent printing without user dialogs
            - ESC/POS thermal printer support
            - Secure TLS/WSS encrypted connections
            - Browser SDK for easy web integration
            - Windows Service auto-start support

            ## 📦 Installation

            ### Quick Install (Recommended)
            1. Download and extract `PrintBridge-windows-x64.zip`
            2. Run `PrintBridge-installer.exe`
            3. Follow the wizard
            4. Service starts automatically

            ### Manual Install
            1. Extract `PrintBridge-windows-x64.zip`
            2. Run `PrintBridge.exe` once (generates certificate)
            3. Right-click `install-cert.ps1` → Run with PowerShell (Admin)
            4. Right-click `install-service.ps1` → Run with PowerShell (Admin)

            ## 🎮 Browser Integration

            ```html
            <script src="printbridge.min.js"></script>
            <script>
              const client = new PrintBridge('wss://127.0.0.1:8282');
              await client.connect();
              await client.print({ data: buffer, printerName: 'THERMAL' });
            </script>
            ```

            ## 📋 Package Contents
            - `PrintBridge.exe` - Main service executable
            - `PrintBridge-installer.exe` - Automated installer
            - Browser SDK (IIFE, ESM, CommonJS formats)
            - `install-cert.ps1` - Certificate installation
            - `install-service.ps1` - Service registration
            - `uninstall-service.ps1` - Service removal
            - `INSTALLATION.md` - Detailed setup guide

            ## 🔐 Security
            - Self-signed TLS certificate (auto-generated)
            - All WebSocket connections encrypted
            - Localhost-only by default
            - Configurable CORS and origins

            ## ⚙️ Configuration
            Edit `%APPDATA%\PXL\config.toml` to customize:
            - WebSocket port (default: 8282)
            - Default printer
            - Certificate paths
            - Service startup behavior

            ## 📞 Support
            - 📖 [Documentation](https://github.com/printbridge/printbridge#readme)
            - 🐛 [Report Issues](https://github.com/printbridge/printbridge/issues)
            - 💬 [Discussions](https://github.com/printbridge/printbridge/discussions)

            ## ✅ System Requirements
            - Windows 7 SP1 or later
            - .NET Framework 4.5+ (pre-installed on Windows 8+)
            - 20 MB disk space

            ---
            **Checksum:** SHA256 in `PrintBridge-windows-x64.zip.sha256`
