name: Build PrintBridge

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Build TypeScript SDK ───────────────────────────────────────────────────
  build-sdk:
    name: Build TypeScript SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: sdk
        run: npm install

      - name: Build SDK
        working-directory: sdk
        run: npm run build

      - name: Upload SDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdk-dist
          path: sdk/dist/
          retention-days: 7

  # ── Cross-compile Rust → Windows x64 ──────────────────────────────────────
  build-windows:
    name: Build Windows EXE (cross-compile from Linux)
    runs-on: ubuntu-latest
    needs: build-sdk
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-win-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-win-

      - name: Install MinGW cross-compiler
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64

      - name: Configure Cargo for MinGW
        run: |
          cat > .cargo/config.toml << 'EOF'
          [target.x86_64-pc-windows-gnu]
          linker = "x86_64-w64-mingw32-gcc"
          ar = "x86_64-w64-mingw32-ar"
          EOF

      - name: Build release binary
        run: |
          cargo build --release --target x86_64-pc-windows-gnu --bin pxl

      - name: Download SDK dist
        uses: actions/download-artifact@v4
        with:
          name: sdk-dist
          path: sdk/dist/

      - name: Package release bundle
        run: |
          mkdir -p release/PrintBridge-windows-x64

          cp target/x86_64-pc-windows-gnu/release/pxl.exe \
             release/PrintBridge-windows-x64/PrintBridge.exe

          cp sdk/dist/printbridge.min.js \
             release/PrintBridge-windows-x64/

          cp sdk/dist/printbridge.esm.js \
             release/PrintBridge-windows-x64/

          cp scripts/install-cert.ps1 \
             release/PrintBridge-windows-x64/

          cp scripts/install-service.ps1 \
             release/PrintBridge-windows-x64/

          cp config.toml \
             release/PrintBridge-windows-x64/

          # Write README snippet
          cat > release/PrintBridge-windows-x64/INSTALL.txt << 'EOF'
          PrintBridge — Installation Guide
          =================================

          1. Run PrintBridge.exe once (generates TLS cert in AppData)
          2. Right-click install-cert.ps1 → Run as Administrator
          3. Right-click install-service.ps1 → Run as Administrator
          4. Open demo/index.html in your browser and click Connect

          Service URL: wss://127.0.0.1:8282
          EOF

          cd release
          zip -r ../PrintBridge-windows-x64.zip PrintBridge-windows-x64/

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: PrintBridge-windows-x64
          path: PrintBridge-windows-x64.zip
          retention-days: 30

      - name: Show binary size
        run: |
          echo "Binary size:"
          ls -lh target/x86_64-pc-windows-gnu/release/pxl.exe
          echo "ZIP size:"
          ls -lh PrintBridge-windows-x64.zip

  # ── GitHub Release (on tag push only) ────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-windows
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: PrintBridge-windows-x64

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: PrintBridge ${{ steps.version.outputs.version }}
          files: PrintBridge-windows-x64.zip
          generate_release_notes: true
          body: |
            ## PrintBridge ${{ steps.version.outputs.version }}

            Silent browser print client for Windows — similar to QZ Tray, built with Rust.

            ### Installation
            1. Download `PrintBridge-windows-x64.zip` and extract
            2. Run `PrintBridge.exe` once to generate the TLS certificate
            3. Run `install-cert.ps1` as Administrator (trusts the cert in Windows)
            4. Run `install-service.ps1` as Administrator (registers as Windows Service)

            ### Browser SDK
            - Drop-in script: `printbridge.min.js`
            - ESM module: `printbridge.esm.js`

            ### Supported
            - ✅ ESC/POS thermal printers
            - ✅ Raw byte output (USB, LAN)
            - ✅ Windows 10/11

            ### Service URL
            `wss://127.0.0.1:8282`
