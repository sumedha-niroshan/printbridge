<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrintBridge — Test Console</title>
<script src="../sdk/dist/printbridge.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;800&display=swap');

  :root {
    --bg: #0d0f14;
    --surface: #151820;
    --surface2: #1c2030;
    --border: #252a3a;
    --accent: #00e5a0;
    --accent2: #3b82f6;
    --warn: #f59e0b;
    --error: #ef4444;
    --text: #e2e8f0;
    --muted: #64748b;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr;
  }

  header {
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--surface);
  }

  .logo {
    font-family: var(--sans);
    font-weight: 800;
    font-size: 20px;
    letter-spacing: -0.5px;
    color: var(--accent);
  }

  .logo span { color: var(--text); }

  #status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--error);
    transition: background .3s;
    flex-shrink: 0;
  }
  #status-dot.connected { background: var(--accent); box-shadow: 0 0 8px var(--accent); }

  #status-text {
    font-size: 12px;
    color: var(--muted);
  }

  .main {
    display: grid;
    grid-template-columns: 300px 1fr;
    height: 100%;
    overflow: hidden;
  }

  /* SIDEBAR */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  .section {
    padding: 20px;
    border-bottom: 1px solid var(--border);
  }

  .section-title {
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  button {
    display: block;
    width: 100%;
    padding: 9px 14px;
    margin-bottom: 6px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    cursor: pointer;
    text-align: left;
    transition: border-color .15s, background .15s;
  }
  button:hover { border-color: var(--accent); background: #1a2030; }
  button.primary { border-color: var(--accent); color: var(--accent); }
  button.primary:hover { background: rgba(0,229,160,.08); }
  button:disabled { opacity: .4; cursor: not-allowed; }

  label {
    display: block;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 4px;
    margin-top: 10px;
  }
  label:first-child { margin-top: 0; }

  select, input, textarea {
    width: 100%;
    padding: 8px 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    outline: none;
    transition: border-color .15s;
  }
  select:focus, input:focus, textarea:focus { border-color: var(--accent2); }
  textarea { resize: vertical; min-height: 80px; }

  #printer-select option { background: var(--bg); }

  /* LOG PANEL */
  .log-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .log-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .log-header-title {
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
  }

  #clear-log {
    width: auto;
    padding: 4px 10px;
    font-size: 11px;
    margin: 0;
    color: var(--muted);
    border-color: transparent;
    background: transparent;
  }
  #clear-log:hover { color: var(--text); border-color: var(--border); }

  #log {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    font-size: 12px;
    line-height: 1.8;
  }

  .log-entry {
    display: flex;
    gap: 12px;
    padding: 3px 0;
    border-bottom: 1px solid rgba(255,255,255,.03);
  }

  .log-time { color: var(--muted); min-width: 80px; flex-shrink: 0; }
  .log-tag {
    min-width: 60px;
    flex-shrink: 0;
    font-weight: 500;
  }
  .log-tag.info  { color: var(--accent2); }
  .log-tag.ok    { color: var(--accent); }
  .log-tag.warn  { color: var(--warn); }
  .log-tag.error { color: var(--error); }
  .log-msg { color: var(--text); word-break: break-all; }

  .printer-list { display: flex; flex-direction: column; gap: 4px; }
  .printer-item {
    padding: 7px 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 11px;
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    transition: border-color .15s;
  }
  .printer-item:hover { border-color: var(--accent); }
  .printer-item .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .printer-item .dot.online  { background: var(--accent); }
  .printer-item .dot.offline { background: var(--error); }
  .printer-item .pname { flex: 1; }
  .printer-item .badge {
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 3px;
    background: rgba(0,229,160,.15);
    color: var(--accent);
  }
</style>
</head>
<body>

<header>
  <div class="logo">Print<span>Bridge</span></div>
  <div id="status-dot"></div>
  <div id="status-text">Disconnected</div>
</header>

<div class="main">
  <div class="sidebar">

    <div class="section">
      <div class="section-title">Connection</div>
      <label>Service URL</label>
      <input id="url-input" value="wss://127.0.0.1:8282" />
      <button class="primary" id="connect-btn" onclick="toggleConnect()" style="margin-top:10px">Connect</button>
    </div>

    <div class="section">
      <div class="section-title">Printers</div>
      <button id="list-btn" onclick="doListPrinters()" disabled>List Printers</button>
      <div id="printer-list" class="printer-list" style="margin-top:8px"></div>
    </div>

    <div class="section">
      <div class="section-title">Print Job</div>
      <label>Printer</label>
      <select id="printer-select"><option value="">— select printer —</option></select>

      <label>Type</label>
      <select id="print-type">
        <option value="escpos">ESC/POS (thermal)</option>
        <option value="raw">Raw bytes</option>
        <option value="text">Plain text</option>
      </select>

      <label>Data (base64 for raw/escpos, text for text)</label>
      <textarea id="print-data" placeholder="Enter data or click 'Test Receipt' below..."></textarea>

      <label>Copies</label>
      <input id="copies" type="number" value="1" min="1" max="99" />

      <button onclick="doTestReceipt()" style="margin-top:10px">Load Test Receipt (ESC/POS)</button>
      <button class="primary" id="print-btn" onclick="doPrint()" disabled style="margin-top:4px">Send Print Job</button>
    </div>

    <div class="section">
      <div class="section-title">Diagnostics</div>
      <button id="ping-btn" onclick="doPing()" disabled>Ping Service</button>
      <button id="status-btn" onclick="doStatus()" disabled>Get Status</button>
    </div>
  </div>

  <div class="log-panel">
    <div class="log-header">
      <div class="log-header-title">// console output</div>
      <button id="clear-log" onclick="document.getElementById('log').innerHTML=''">clear</button>
    </div>
    <div id="log"></div>
  </div>
</div>

<script>
  let client = null;

  function log(level, msg) {
    const el = document.getElementById('log');
    const now = new Date();
    const time = now.toTimeString().slice(0,8);
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    entry.innerHTML = `
      <span class="log-time">${time}</span>
      <span class="log-tag ${level}">${level.toUpperCase().padEnd(5)}</span>
      <span class="log-msg">${escHtml(msg)}</span>
    `;
    el.appendChild(entry);
    el.scrollTop = el.scrollHeight;
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function setConnected(yes) {
    document.getElementById('status-dot').className = yes ? 'connected' : '';
    document.getElementById('status-text').textContent = yes ? 'Connected to PrintBridge' : 'Disconnected';
    document.getElementById('connect-btn').textContent = yes ? 'Disconnect' : 'Connect';
    const btns = ['list-btn','ping-btn','status-btn','print-btn'];
    btns.forEach(id => document.getElementById(id).disabled = !yes);
  }

  async function toggleConnect() {
    if (client && client.connected) {
      client.disconnect();
      client = null;
      setConnected(false);
      log('warn', 'Disconnected');
      return;
    }

    const url = document.getElementById('url-input').value.trim();
    log('info', `Connecting to ${url}...`);

    client = new PrintBridge.PrintClient({ url, reconnect: true });
    client.on('connect',    () => { setConnected(true);  log('ok',    'Connected!'); });
    client.on('disconnect', () => { setConnected(false); log('warn',  'Disconnected — reconnecting...'); });
    client.on('error',      e  => { log('error', e.message); });

    try {
      await client.connect();
    } catch(e) {
      log('error', e.message);
      client = null;
    }
  }

  async function doListPrinters() {
    log('info', 'Listing printers...');
    try {
      const printers = await client.listPrinters();
      log('ok', `Found ${printers.length} printer(s)`);

      const listEl = document.getElementById('printer-list');
      const sel = document.getElementById('printer-select');
      listEl.innerHTML = '';
      sel.innerHTML = '<option value="">— select printer —</option>';

      printers.forEach(p => {
        // Sidebar item
        const item = document.createElement('div');
        item.className = 'printer-item';
        item.innerHTML = `
          <span class="dot ${p.isOnline ? 'online' : 'offline'}"></span>
          <span class="pname">${escHtml(p.name)}</span>
          ${p.isDefault ? '<span class="badge">default</span>' : ''}
        `;
        item.onclick = () => {
          sel.value = p.name;
          log('info', `Selected: ${p.name}`);
        };
        listEl.appendChild(item);

        // Dropdown
        const opt = document.createElement('option');
        opt.value = p.name;
        opt.textContent = p.name + (p.isDefault ? ' (default)' : '');
        sel.appendChild(opt);
      });
    } catch(e) {
      log('error', e.message);
    }
  }

  async function doPrint() {
    const printer = document.getElementById('printer-select').value;
    if (!printer) { log('warn', 'Select a printer first'); return; }
    const type = document.getElementById('print-type').value;
    const data = document.getElementById('print-data').value;
    const copies = parseInt(document.getElementById('copies').value) || 1;

    if (!data) { log('warn', 'No data to print'); return; }

    log('info', `Sending ${type} job to "${printer}" (${copies} cop${copies>1?'ies':'y'})...`);
    try {
      const result = await client.print({ printer, type, data, copies });
      log('ok', `Print success — ${result.copies} cop${result.copies>1?'ies':'y'} sent`);
    } catch(e) {
      log('error', e.message);
    }
  }

  async function doPing() {
    try {
      const ok = await client.ping();
      log('ok', `Pong! Service is alive (${ok})`);
    } catch(e) {
      log('error', e.message);
    }
  }

  async function doStatus() {
    try {
      const s = await client.status();
      log('ok', `Version: ${s.version} | Status: ${s.status}`);
    } catch(e) {
      log('error', e.message);
    }
  }

  function doTestReceipt() {
    // ESC/POS test receipt in base64
    // ESC @ (init) + ESC a 1 (center) + text + cut
    const escpos = [
      0x1B, 0x40,                    // ESC @ - Initialize
      0x1B, 0x61, 0x01,              // ESC a 1 - Center
      0x1B, 0x21, 0x30,              // Double height+width
      ...strBytes('PrintBridge\n'),
      0x1B, 0x21, 0x00,              // Normal size
      ...strBytes('--- Test Receipt ---\n'),
      0x1B, 0x61, 0x00,              // Left align
      ...strBytes('Item 1          $10.00\n'),
      ...strBytes('Item 2           $5.50\n'),
      ...strBytes('------------------------\n'),
      0x1B, 0x21, 0x08,              // Bold
      ...strBytes('TOTAL           $15.50\n'),
      0x1B, 0x21, 0x00,
      0x0A, 0x0A, 0x0A,              // Feed
      0x1D, 0x56, 0x42, 0x00,        // Cut
    ];
    const b64 = btoa(String.fromCharCode(...escpos));
    document.getElementById('print-data').value = b64;
    document.getElementById('print-type').value = 'escpos';
    log('info', 'Test ESC/POS receipt loaded — select a printer and click Send');
  }

  function strBytes(str) {
    return [...str].map(c => c.charCodeAt(0));
  }

  log('info', 'PrintBridge demo console ready');
  log('info', 'Click "Connect" to connect to the local service');
</script>
</body>
</html>
